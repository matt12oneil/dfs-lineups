const posClass = p => p==='SP'?'pos-sp':p==='OF'?'pos-of':p==='C'?'pos-c':'pos-inf';
const bClass   = p => ({mean:'b-mean',p75:'b-p75',p90:'b-p90',blend:'b-blend'})[p]||'b-mean';
const bLabel   = p => ({mean:'Mean',p75:'P75',p90:'P90',blend:'Blend'})[p]||p;
const posOrder = {SP:0,C:1,'C/1B':1,'1B':2,'2B':3,'3B':4,SS:5,OF:6,UTIL:7};

function exposure(lus) {
  const e={};
  lus.forEach(l=>l.players.forEach(p=>{e[p.name]=(e[p.name]||0)+1}));
  return e;
}

function render(lus) {
  const exp = exposure(lus);
  const n   = lus.length;
  document.getElementById('lu_summary').innerHTML = !n ? '' : `
    <div class="lu-stat"><div class="sl">Lineups</div><div class="sv">${n}</div></div>
    <div class="lu-stat"><div class="sl">Avg mean</div><div class="sv">${(lus.reduce((s,l)=>s+l.mean_pts,0)/n).toFixed(1)}</div></div>
    <div class="lu-stat"><div class="sl">Avg P90</div><div class="sv">${(lus.reduce((s,l)=>s+l.p90_pts,0)/n).toFixed(1)}</div></div>
    <div class="lu-stat"><div class="sl">Max exposure</div><div class="sv">${(Math.max(...Object.values(exp))/n*100).toFixed(0)}%</div></div>
  `;
  const grid = document.getElementById('lu_grid');
  grid.innerHTML = '';
  lus.forEach((lu, idx) => {
    const sorted = [...lu.players].sort((a,b)=>(posOrder[a.pos]??8)-(posOrder[b.pos]??8));
    const highExp = Object.entries(exp).filter(([,c])=>c/n>=0.3).map(([nm,c])=>`${nm} — ${(c/n*100).toFixed(0)}%`);
    const d = document.createElement('div');
    d.className = 'lu-card';
    d.innerHTML = `
      <div class="lu-hdr" onclick="lu_toggle('${lu.id}')">
        <div class="lu-left">
          <span class="lu-num">#${idx+1}</span>
          <span class="lu-badge ${bClass(lu.pct)}">${bLabel(lu.pct)}</span>
        </div>
        <div class="lu-right">
          <div class="lu-pg"><div class="pl">Mean</div><div class="pv">${lu.mean_pts.toFixed(1)}</div></div>
          <div class="lu-pg"><div class="pl">P90</div><div class="pv">${lu.p90_pts.toFixed(1)}</div></div>
          <div class="lu-pg"><div class="pl">Salary</div><div class="pv">$${lu.salary.toLocaleString()}</div></div>
          <span class="lu-chev" id="luchev_${lu.id}">▶</span>
        </div>
      </div>
      <div class="lu-body" id="lubody_${lu.id}">
        <table class="lu-tbl">
          <thead><tr><th>Pos</th><th>Player</th><th>Team</th><th class="r">Salary</th><th class="r">Mean</th><th class="r">P90</th></tr></thead>
          <tbody>
            ${sorted.map(p=>`
              <tr>
                <td><span class="${posClass(p.pos)}">${p.pos}</span></td>
                <td>${p.name}</td>
                <td style="color:#888">${p.team}</td>
                <td class="r">$${p.salary.toLocaleString()}</td>
                <td class="r">${p.mean.toFixed(1)}</td>
                <td class="r">${p.p90.toFixed(1)}</td>
              </tr>
            `).join('')}
            <tr class="lu-total">
              <td colspan="3">Total</td>
              <td class="r">$${lu.salary.toLocaleString()}</td>
              <td class="r">${lu.mean_pts.toFixed(1)}</td>
              <td class="r">${lu.p90_pts.toFixed(1)}</td>
            </tr>
          </tbody>
        </table>
        ${highExp.length ? `<div class="exp-bar"><div class="exp-lbl">Players in ≥30% of lineups</div><div class="exp-pills">${highExp.map(s=>`<span class="exp-pill">${s}</span>`).join('')}</div></div>` : ''}
      </div>
    `;
    grid.appendChild(d);
  });
}

function lu_toggle(id) {
  document.getElementById('lubody_'+id).classList.toggle('open');
  document.getElementById('luchev_'+id).classList.toggle('open');
}
function lu_expandAll()   { document.querySelectorAll('.lu-body').forEach(b=>b.classList.add('open')); document.querySelectorAll('.lu-chev').forEach(c=>c.classList.add('open')); }
function lu_collapseAll() { document.querySelectorAll('.lu-body').forEach(b=>b.classList.remove('open')); document.querySelectorAll('.lu-chev').forEach(c=>c.classList.remove('open')); }
function lu_refresh() {
  const pct  = document.getElementById('lu_pctF').value;
  const sort = document.getElementById('lu_sortF').value;
  const min  = parseFloat(document.getElementById('lu_minPts').value)||0;
  let lus = DATA.filter(l => (pct==='all'||l.pct===pct) && l.mean_pts>=min);
  lus.sort((a,b) => sort==='p90'?b.p90_pts-a.p90_pts:sort==='salary'?b.salary-a.salary:b.mean_pts-a.mean_pts);
  render(lus);
}
lu_refresh();
</script>
